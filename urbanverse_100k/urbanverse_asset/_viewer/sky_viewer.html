<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UrbanVerse Sky Viewer</title>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #191919;
      color: #ddd;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── nav bar ── */
    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #252525;
      border-bottom: 1px solid #333;
      padding: 8px 16px;
      height: 48px;
      flex-shrink: 0;
    }
    .nav-side { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .nav-side.right { justify-content: flex-end; }
    .nav-center { flex: 1; text-align: center; }
    #page-title { font-size: 15px; font-weight: 600; color: #fff; }

    .nav-btn {
      background: #333;
      border: 1px solid #444;
      color: #ddd;
      padding: 5px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: #4a9eff; border-color: #4a9eff; color: #fff; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #counter { font-size: 12px; color: #888; }

    /* ── info bar ── */
    #info-bar {
      background: #1f1f1f;
      border-bottom: 1px solid #2c2c2c;
      padding: 6px 16px;
      flex-shrink: 0;
    }
    #sky-name { font-size: 14px; color: #6af; font-weight: 500; }
    #sky-path { font-size: 11px; color: #555; margin-top: 2px; }

    /* ── canvas area ── */
    #canvas-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── loading overlay ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(25,25,25,0.80);
      gap: 14px;
      font-size: 14px;
      color: #888;
      pointer-events: none;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── sphere legend ── */
    #legend {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      background: rgba(0,0,0,0.55);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 20px;
      pointer-events: none;
    }
    .legend-item { text-align: center; font-size: 11px; color: #999; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      margin: 0 auto 3px;
    }

    /* ── thumbnail strip (shown when available) ── */
    #thumb-bar {
      display: none;
      background: #1a1a1a;
      border-top: 1px solid #2c2c2c;
      padding: 6px 12px;
      flex-shrink: 0;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
    }
    #thumb-bar img {
      height: 48px;
      width: 72px;
      object-fit: cover;
      border-radius: 3px;
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
    }
    #thumb-bar img.active { border-color: #4a9eff; }
    #thumb-bar img:hover   { border-color: #6bbfff; }
  </style>
</head>
<body>

<div id="app">
  <div id="navbar">
    <div class="nav-side">
      <button class="nav-btn" id="btn-prev">&#8592;</button>
      <span id="counter">1 / 1</span>
    </div>
    <div class="nav-center"><span id="page-title">UrbanVerse Sky Viewer</span></div>
    <div class="nav-side right">
      <button class="nav-btn" id="btn-next">&#8594;</button>
    </div>
  </div>

  <div id="info-bar">
    <div id="sky-name"></div>
    <div id="sky-path"></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>

    <div id="loading">
      <div class="spinner"></div>
      <span id="loading-text">Loading sky map…</span>
    </div>

    <div id="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#fff;border:1px solid #888"></div>
        Chrome<br>(rough=0)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#c0c0c0;border:1px solid #888"></div>
        Adjustable<br>roughness
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#888;border:1px solid #555"></div>
        Matte<br>(rough=1)
      </div>
    </div>
  </div>

  <div id="thumb-bar"></div>
</div>

<!-- Injected by Python -->
<script>const VIEWER_CONFIG = /* __VIEWER_CONFIG__ */;</script>

<script type="module">
  import * as THREE        from 'three';
  import { EXRLoader }     from 'three/addons/loaders/EXRLoader.js';
  import { RGBELoader }    from 'three/addons/loaders/RGBELoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import GUI               from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

  // ── Config ────────────────────────────────────────────────────────────────
  const CFG       = VIEWER_CONFIG;
  const materials = CFG.materials || [];
  let   idx       = 0;

  // ── DOM ───────────────────────────────────────────────────────────────────
  const pageTitle   = document.getElementById('page-title');
  const counter     = document.getElementById('counter');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const skyName     = document.getElementById('sky-name');
  const skyPath     = document.getElementById('sky-path');
  const canvasEl    = document.getElementById('canvas');
  const loadingEl   = document.getElementById('loading');
  const loadingText = document.getElementById('loading-text');
  const thumbBar    = document.getElementById('thumb-bar');

  pageTitle.textContent = CFG.title || 'UrbanVerse Sky Viewer';

  // ── Three.js setup ────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping        = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace   = THREE.SRGBColorSpace;

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 1000);
  camera.position.set(0, 1.2, 5);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  const pmremGen = new THREE.PMREMGenerator(renderer);
  pmremGen.compileEquirectangularShader();

  // ── Reference spheres ─────────────────────────────────────────────────────
  const sphereGeo = new THREE.SphereGeometry(0.7, 64, 32);

  const chromeMat = new THREE.MeshStandardMaterial({ metalness: 1, roughness: 0 });
  const roughMat  = new THREE.MeshStandardMaterial({ metalness: 0, roughness: 0.5,
                                                      color: 0xd0d0d0 });
  const matteMat  = new THREE.MeshStandardMaterial({ metalness: 0, roughness: 1.0,
                                                      color: 0x888888 });

  const chromeSphere = new THREE.Mesh(sphereGeo, chromeMat);
  const roughSphere  = new THREE.Mesh(sphereGeo, roughMat);
  const matteSphere  = new THREE.Mesh(sphereGeo, matteMat);

  chromeSphere.position.set(-2.2, 0, 0);
  roughSphere.position.set(0, 0, 0);
  matteSphere.position.set(2.2, 0, 0);

  scene.add(chromeSphere, roughSphere, matteSphere);

  // ── GUI state ─────────────────────────────────────────────────────────────
  const guiState = {
    showBackground: true,
    roughness: 0.5,
    exposure:  1.0,
    autoRotate: false,
  };

  const gui = new GUI({ title: 'Controls', width: 230 });
  gui.domElement.style.position = 'absolute';
  gui.domElement.style.top      = '0px';
  gui.domElement.style.right    = '0px';

  gui.add(guiState, 'showBackground').name('Background').onChange(v => {
    scene.background = v ? (currentEnvMap || new THREE.Color(0x1a1a1a)) : new THREE.Color(0x1a1a1a);
  });
  gui.add(guiState, 'roughness', 0, 1, 0.01).name('Roughness (mid)').onChange(v => {
    roughMat.roughness = v;
  });
  gui.add(guiState, 'exposure', 0.1, 4, 0.05).name('Exposure').onChange(v => {
    renderer.toneMappingExposure = v;
  });
  gui.add(guiState, 'autoRotate').name('Auto-rotate').onChange(v => {
    controls.autoRotate = v;
    controls.autoRotateSpeed = 1.5;
  });
  gui.add({ reset: () => {
    camera.position.set(0, 1.2, 5);
    controls.target.set(0, 0, 0);
    controls.update();
  }}, 'reset').name('Reset Camera');

  document.getElementById('canvas-wrap').appendChild(gui.domElement);

  // ── Environment map management ────────────────────────────────────────────
  let currentEnvMap = null;
  let loadingAborted = false;

  function clearEnv() {
    if (currentEnvMap) { currentEnvMap.dispose(); currentEnvMap = null; }
    scene.environment = null;
    scene.background  = guiState.showBackground ? null : new THREE.Color(0x1a1a1a);
  }

  function applyEnvMap(texture) {
    const envMap = pmremGen.fromEquirectangular(texture).texture;
    texture.dispose();
    currentEnvMap = envMap;
    scene.environment = envMap;
    scene.background  = guiState.showBackground ? envMap : new THREE.Color(0x1a1a1a);
  }

  function loadHDR(url) {
    if (!url) {
      loadingEl.style.display  = 'flex';
      loadingText.textContent  = 'No HDR file available for this sky map.';
      clearEnv();
      return;
    }

    loadingEl.style.display = 'flex';
    loadingText.textContent = 'Loading sky map…';
    clearEnv();

    const ext  = url.split('?')[0].split('.').pop().toLowerCase();
    const Ldr  = ext === 'exr' ? EXRLoader : RGBELoader;
    const loader = new Ldr();

    loader.load(
      url,
      texture => {
        applyEnvMap(texture);
        loadingEl.style.display = 'none';
      },
      undefined,
      err => {
        console.error('HDR load error:', err);
        loadingText.textContent = 'Failed to load sky map.';
      }
    );
  }

  // ── Thumbnail strip ────────────────────────────────────────────────────────
  const thumbEls = [];
  const hasThumbs = materials.some(m => m.thumbnail_url);
  if (hasThumbs) {
    thumbBar.style.display = 'flex';
    materials.forEach((mat, i) => {
      if (!mat.thumbnail_url) return;
      const img = document.createElement('img');
      img.src   = mat.thumbnail_url;
      img.alt   = mat.description;
      img.title = mat.description;
      img.onerror = () => { img.style.display = 'none'; };
      img.onclick = () => goTo(i);
      thumbBar.appendChild(img);
      thumbEls.push({ el: img, matIdx: i });
    });
  }

  function updateThumbs() {
    thumbEls.forEach(({ el, matIdx }) => {
      el.classList.toggle('active', matIdx === idx);
    });
    // Scroll active thumb into view
    const active = thumbEls.find(t => t.matIdx === idx);
    if (active) active.el.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function goTo(newIdx) {
    if (materials.length === 0) return;
    idx = Math.max(0, Math.min(newIdx, materials.length - 1));
    const mat = materials[idx];

    counter.textContent  = `${idx + 1} / ${materials.length}`;
    btnPrev.disabled     = idx === 0;
    btnNext.disabled     = idx === materials.length - 1;
    skyName.textContent  = mat.description;
    skyPath.textContent  = `Saved: ${mat.saved_path || '(not downloaded)'}`;

    loadHDR(mat.hdr_url);
    updateThumbs();
  }

  btnPrev.addEventListener('click', () => goTo(idx - 1));
  btnNext.addEventListener('click', () => goTo(idx + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a') goTo(idx - 1);
    if (e.key === 'ArrowRight' || e.key === 'd') goTo(idx + 1);
  });

  // ── Resize ────────────────────────────────────────────────────────────────
  function onResize() {
    const w = canvasEl.clientWidth;
    const h = canvasEl.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(onResize).observe(canvasEl);
  onResize();

  // ── Render loop ───────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── Init ──────────────────────────────────────────────────────────────────
  if (materials.length === 0) {
    loadingText.textContent = 'No sky materials to display.';
  } else {
    goTo(0);
  }
</script>
</body>
</html>
